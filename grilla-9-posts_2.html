<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grilla de contenido</title>
<style>
  :root{
    --border:#dbdbdb;
    --bg:#fafafa;
    --text:#262626;
    --gray:#8e8e8e;
    --blue:#0095f6;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#f0f2f5;
    color:var(--text);
    min-height:100vh;
    padding:32px 20px 60px;
  }
  .wrap{
    max-width:640px;
    margin:0 auto;
  }
  header{
    margin-bottom:22px;
  }
  header h1{
    font-size:20px;
    font-weight:700;
  }
  header p{
    font-size:13px;
    color:var(--gray);
    margin-top:2px;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:3px;
    background:#fff;
    border:1px solid var(--border);
    border-radius:4px;
    overflow:hidden;
  }
  .cell{
    position:relative;
    aspect-ratio:1080/1440;
    background:repeating-linear-gradient(45deg,#f4f4f4,#f4f4f4 8px,#ececec 8px,#ececec 16px);
    cursor:pointer;
  }
  .cell img{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  .cell .empty-label{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:4px; color:#a8a8a8; font-size:12px; text-align:center; padding:8px;
  }
  .cell .empty-label .plus{
    font-size:22px; line-height:1; color:#c2c2c2;
  }
  .cell .cap-flag{
    position:absolute; bottom:6px; left:6px; right:6px;
    font-size:10px; color:#fff; background:rgba(0,0,0,.55);
    padding:2px 6px; border-radius:3px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .cell:hover::after{
    content:'';
    position:absolute; inset:0; background:rgba(0,0,0,.15);
  }
  .cell .pos-num{
    position:absolute; top:6px; left:6px;
    font-size:10px; font-weight:700; color:#fff;
    background:rgba(0,0,0,.5); border-radius:3px; padding:1px 5px;
  }

  .save-status{
    font-size:11.5px; color:var(--gray); text-align:center; margin-top:14px; min-height:16px;
  }

  .row-controls{
    display:flex; gap:8px; justify-content:center; margin-top:14px;
  }
  .row-btn{
    font-size:12.5px; font-weight:600; padding:8px 14px; border-radius:6px;
    border:1px solid var(--border); background:#fff; cursor:pointer;
    display:flex; align-items:center; gap:6px;
  }
  .row-btn:hover{background:var(--bg);}
  .row-btn:disabled{opacity:.4; cursor:not-allowed;}
  .row-btn:disabled:hover{background:#fff;}

  /* ---------- Edit modal ---------- */
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,.7);
    display:none; align-items:center; justify-content:center;
    z-index:100; padding:16px;
  }
  .modal-backdrop.open{display:flex;}
  .modal{
    background:#fff;
    width:100%; max-width:820px;
    max-height:92vh;
    border-radius:10px;
    display:flex;
    overflow:hidden;
  }

  /* -- VIEW MODE -- */
  .modal-view{
    display:flex; width:100%;
  }
  .modal-img{
    flex:1.2;
    background:#000;
    display:flex; align-items:center; justify-content:center;
    min-height:380px;
  }
  .modal-img img{max-width:100%; max-height:88vh; object-fit:contain;}
  .modal-side{
    flex:1;
    min-width:280px;
    max-width:340px;
    display:flex;
    flex-direction:column;
  }
  .modal-head{
    display:flex; align-items:center; padding:12px 16px;
    border-bottom:1px solid var(--border);
    font-size:13px; font-weight:600; color:var(--gray);
  }
  .modal-close{margin-left:auto; background:none; border:none; font-size:18px; cursor:pointer; color:var(--gray);}
  .modal-caption{
    flex:1; padding:16px; font-size:13.5px; line-height:1.55; overflow-y:auto; white-space:pre-line;
  }
  .modal-caption.empty{color:var(--gray); font-style:italic;}
  .modal-actions{
    padding:12px 16px; border-top:1px solid var(--border);
    display:flex; gap:8px; flex-wrap:wrap;
  }
  .btn{
    font-size:12.5px; font-weight:600; padding:8px 12px; border-radius:6px;
    border:1px solid var(--border); background:#fff; cursor:pointer; flex:1; text-align:center;
    white-space:nowrap;
  }
  .btn:hover{background:var(--bg);}
  .btn.primary{background:var(--blue); border-color:var(--blue); color:#fff;}
  .btn.primary:hover{background:#1877c9;}
  .btn.edit{background:var(--text); border-color:var(--text); color:#fff;}
  .btn.edit:hover{background:#000;}

  /* -- EDIT MODE -- */
  .modal-edit{
    width:100%;
    display:flex;
    flex-direction:column;
    max-height:92vh;
  }
  .edit-head{
    display:flex; align-items:center; padding:14px 18px;
    border-bottom:1px solid var(--border);
    font-size:14px; font-weight:700;
  }
  .edit-body{
    padding:18px; overflow-y:auto;
  }
  .edit-body label{
    display:block; font-size:11.5px; font-weight:600; color:var(--gray);
    text-transform:uppercase; letter-spacing:.03em; margin-bottom:6px;
  }
  .file-label{
    display:block; text-align:center; font-size:13px; font-weight:600;
    color:var(--blue); border:1px dashed var(--border); border-radius:8px;
    padding:16px; cursor:pointer; margin-bottom:14px;
  }
  .file-label:hover{background:var(--bg);}
  input[type="file"]{display:none;}
  .edit-thumb{
    width:100%; max-height:220px; object-fit:contain; border-radius:8px; margin-bottom:14px;
    display:none; background:#f4f4f4;
  }
  textarea{
    width:100%; font-size:13.5px; padding:10px 12px; border:1px solid var(--border);
    border-radius:8px; font-family:inherit; resize:vertical; min-height:110px; margin-bottom:14px;
    line-height:1.5;
  }
  .edit-footer{
    padding:14px 18px; border-top:1px solid var(--border);
    display:flex; gap:8px;
  }
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:#262626; color:#fff; font-size:13px; padding:9px 16px;
    border-radius:20px; opacity:0; pointer-events:none; transition:opacity .2s;
    z-index:200;
  }
  .toast.show{opacity:1;}

  @media (max-width:700px){
    .modal-view{flex-direction:column;}
    .modal-img{min-height:220px;}
    .modal-side{max-width:100%;}
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <h1>Grilla de contenido</h1>
    <p>Sube las 9 fotos y su copy para revisar el orden antes de publicar</p>
  </header>

  <div class="grid" id="grid"></div>
  <div class="row-controls">
    <button class="row-btn" id="addRowBtn">+ Agregar fila (3)</button>
    <button class="row-btn" id="removeRowBtn">− Quitar última fila</button>
    <button class="row-btn" id="refreshBtn">↻ Actualizar</button>
  </div>
  <div class="save-status" id="saveStatus"></div>
  <p style="font-size:11px; color:var(--gray); text-align:center; margin-top:6px;">Esta grilla es compartida: los cambios los ve cualquiera que abra este link.</p>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modal"></div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  const STORE_KEY = 'ig-grid9-data';
  const ROW_SIZE = 3;
  let nextSlot = 9;
  let posts = Array.from({length:9}, (_,i)=>({ id:'slot_'+i, img:null, caption:'' }));
  let activeId = null;
  let mode = 'view'; // 'view' | 'edit'
  let pendingImg = null;

  const el = id => document.getElementById(id);

  async function loadState(){
    try{
      const res = await window.storage.get(STORE_KEY, true);
      if(res && res.value){
        const saved = JSON.parse(res.value);
        if(Array.isArray(saved) && saved.length){
          posts = saved;
          // figure out next slot number from existing ids like slot_N
          const nums = posts.map(p=>{
            const m = /^slot_(\d+)$/.exec(p.id);
            return m ? parseInt(m[1],10) : -1;
          });
          nextSlot = Math.max(...nums, -1) + 1;
        }
      }
    }catch(e){ /* nothing saved yet */ }
    renderGrid();
  }

  function addRow(){
    for(let i=0;i<ROW_SIZE;i++){
      posts.push({ id:'slot_'+nextSlot, img:null, caption:'' });
      nextSlot++;
    }
    saveState();
    renderGrid();
  }

  function removeRow(){
    if(posts.length <= ROW_SIZE) return; // keep at least one row
    const removed = posts.splice(posts.length - ROW_SIZE, ROW_SIZE);
    const hadContent = removed.some(p=>p.img || p.caption);
    if(hadContent && !confirm('La última fila tiene contenido. ¿Quitarla de todas formas?')){
      // put back
      posts = posts.concat(removed);
      return;
    }
    saveState();
    renderGrid();
  }

  function deletePost(id){
    if(posts.length <= 1) return;
    posts = posts.filter(p=>p.id!==id);
    saveState();
    renderGrid();
    closeModal();
  }

  let saveTimeout = null;
  function saveState(){
    el('saveStatus').textContent = 'Guardando...';
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(async ()=>{
      try{
        await window.storage.set(STORE_KEY, JSON.stringify(posts), true);
        el('saveStatus').textContent = 'Guardado ✓';
        setTimeout(()=>{ if(el('saveStatus').textContent==='Guardado ✓') el('saveStatus').textContent=''; }, 1500);
      }catch(e){
        el('saveStatus').textContent = 'Error al guardar';
      }
    }, 250);
  }

  function fileToDataUrl(file){
    return new Promise((resolve,reject)=>{
      const reader = new FileReader();
      reader.onload = ()=> resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  function showToast(msg){
    const t = el('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=> t.classList.remove('show'), 1800);
  }

  function renderGrid(){
    const grid = el('grid');
    grid.innerHTML = posts.map((p,i)=>`
      <div class="cell" data-id="${p.id}">
        <span class="pos-num">${i+1}</span>
        ${p.img
          ? `<img src="${p.img}">` + (p.caption ? `<div class="cap-flag">${escapeHtml(p.caption)}</div>` : '')
          : `<div class="empty-label"><span class="plus">+</span>Subir foto</div>`
        }
      </div>
    `).join('');
    grid.querySelectorAll('.cell').forEach(cellEl=>{
      cellEl.addEventListener('click', ()=>{
        activeId = cellEl.dataset.id;
        const post = posts.find(p=>p.id===activeId);
        mode = post.img ? 'view' : 'edit';
        openModal();
      });
    });

    el('removeRowBtn').disabled = posts.length <= ROW_SIZE;
  }

  function openModal(){
    el('modalBackdrop').classList.add('open');
    renderModal();
  }
  function closeModal(){
    el('modalBackdrop').classList.remove('open');
    pendingImg = null;
    activeId = null;
  }

  function renderModal(){
    const post = posts.find(p=>p.id===activeId);
    const modal = el('modal');

    if(mode === 'view'){
      modal.innerHTML = `
        <div class="modal-view">
          <div class="modal-img">
            <img src="${post.img}">
          </div>
          <div class="modal-side">
            <div class="modal-head">
              Post
              <button class="modal-close" id="mClose">✕</button>
            </div>
            <div class="modal-caption ${post.caption ? '' : 'empty'}">${post.caption ? escapeHtml(post.caption) : 'Sin caption todavía.'}</div>
            <div class="modal-actions">
              <button class="btn primary" id="mDownload">Descargar imagen</button>
              <button class="btn" id="mCopyCaption">Copiar caption</button>
              <button class="btn edit" id="mEdit">Editar</button>
            </div>
          </div>
        </div>
      `;
      el('mClose').addEventListener('click', closeModal);
      el('mDownload').addEventListener('click', ()=> downloadImage(post));
      el('mCopyCaption').addEventListener('click', ()=> copyCaption(post));
      el('mEdit').addEventListener('click', ()=>{ mode='edit'; renderModal(); });
    } else {
      modal.innerHTML = `
        <div class="modal-edit">
          <div class="edit-head">Editar post</div>
          <div class="edit-body">
            <label>Imagen</label>
            <label class="file-label" for="editImgInput">${post.img ? 'Cambiar imagen' : 'Subir imagen'}</label>
            <input type="file" id="editImgInput" accept="image/*">
            <img class="edit-thumb" id="editThumb" style="${(pendingImg||post.img) ? 'display:block;' : ''}" src="${pendingImg||post.img||''}">

            <label>Caption</label>
            <textarea id="editCaption" placeholder="Escribe el copy de este post...">${post.caption||''}</textarea>
          </div>
          <div class="edit-footer">
            <button class="btn primary" id="mSave">Guardar</button>
            <button class="btn" id="mCancel">Cancelar</button>
            ${posts.length > 1 ? `<button class="btn" id="mDelete" style="color:#ed4956; border-color:#ed4956;">Eliminar celda</button>` : ''}
          </div>
        </div>
      `;
      el('editImgInput').addEventListener('change', async e=>{
        const file = e.target.files[0];
        if(!file) return;
        pendingImg = await fileToDataUrl(file);
        const thumb = el('editThumb');
        thumb.src = pendingImg;
        thumb.style.display = 'block';
      });
      el('mSave').addEventListener('click', ()=>{
        const caption = el('editCaption').value;
        post.caption = caption;
        if(pendingImg) post.img = pendingImg;
        pendingImg = null;
        saveState();
        renderGrid();
        if(post.img){ mode='view'; renderModal(); } else { closeModal(); }
      });
      el('mCancel').addEventListener('click', ()=>{
        pendingImg = null;
        if(post.img){ mode='view'; renderModal(); } else { closeModal(); }
      });
      const delBtn = el('mDelete');
      if(delBtn){
        delBtn.addEventListener('click', ()=>{
          if(confirm('¿Eliminar esta celda de la grilla?')) deletePost(post.id);
        });
      }
    }
  }

  function downloadImage(post){
    if(!post.img) return;
    const a = document.createElement('a');
    a.href = post.img;
    const ext = (post.img.match(/^data:image\/(\w+);/) || [,'jpg'])[1];
    a.download = `post-${post.id}.${ext}`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  async function copyCaption(post){
    try{
      await navigator.clipboard.writeText(post.caption || '');
      showToast('Caption copiado');
    }catch(e){
      showToast('No se pudo copiar');
    }
  }

  el('modalBackdrop').addEventListener('click', (e)=>{
    if(e.target === el('modalBackdrop')) closeModal();
  });

  el('addRowBtn').addEventListener('click', addRow);
  el('removeRowBtn').addEventListener('click', removeRow);
  el('refreshBtn').addEventListener('click', async ()=>{
    el('saveStatus').textContent = 'Actualizando...';
    await loadState();
    el('saveStatus').textContent = 'Actualizado ✓';
    setTimeout(()=>{ if(el('saveStatus').textContent==='Actualizado ✓') el('saveStatus').textContent=''; }, 1500);
  });

  loadState();
})();
</script>

</body>
</html>
